apiVersion: apps/v1
kind: Deployment
metadata:
  name: todos-api
  namespace: demo
  labels:
    app.kubernetes.io/name: todos-api
    app.kubernetes.io/component: provider-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: todos-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todos-api
        app.kubernetes.io/component: provider-api
    spec:
      containers:
        - name: todos-api
          image: ghcr.io/colinjlacy/runtime-conditions-profiles-todos-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: todos-api
  namespace: demo
  labels:
    app.kubernetes.io/name: todos-api
spec:
  selector:
    app.kubernetes.io/name: todos-api
  ports:
    - name: http
      port: 8080
      targetPort: http
